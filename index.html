    <script>


        // JS 邏輯維持原樣

// 儲存每一局的結算到 localStorage
function saveMonthlyData() {
    localStorage.setItem('gameHistory', JSON.stringify(gameHistory));
}

// 讀取資料 (在頁面載入時執行)
function loadData() {
    let savedData = localStorage.getItem('gameHistory');
    if (savedData) {
        gameHistory = JSON.parse(savedData);
        renderHistory();
        renderMonthlyReport(); // 載入後自動計算月報表
    }
}

//清除資料
function clearAllData() {
    if (confirm("確定要清除所有積分紀錄嗎？此動作無法復原！")) {
        localStorage.removeItem('gameHistory'); // 清除存檔
        gameHistory = [];                       // 清空記憶體
        renderHistory();                        // 清空歷史頁面
        renderMonthlyReport();                  // 清空報表頁面
        alert("資料已清空");
    }
}

// 排行榜
function renderMonthlyReport(selectedMonthYear) {
    const now = new Date();
    const targetMonth = selectedMonthYear ? parseInt(selectedMonthYear.split('-')[0]) : now.getMonth() + 1;
    const targetYear = selectedMonthYear ? parseInt(selectedMonthYear.split('-')[1]) : now.getFullYear();
    
    let reportMap = {};
    gameHistory.forEach(round => {
        if (round.year === targetYear && round.month === targetMonth) {
            round.players.forEach(p => {
                if (!reportMap[p.name]) reportMap[p.name] = 0;
                reportMap[p.name] += p.score;
            });
        }
    });

// --- 新增：找出最高積分 ---
    const scores = Object.values(reportMap);
    const maxScore = scores.length > 0 ? Math.max(...scores) : 0;

    let list = document.getElementById('monthly-report-list');
    
    // 使用 flex 佈局確保三者垂直排列且間距美觀
list.innerHTML = `
        <div style="display: flex; flex-direction: column; align-items: center; gap: 20px;">
            <div>
                <select onchange="renderMonthlyReport(this.value)" style="padding: 5px; border-radius: 4px;">
                    <option value="6-2026" ${targetMonth===6 && targetYear===2026 ? 'selected' : ''}>2026年 6月</option>
                    <option value="5-2026" ${targetMonth===5 && targetYear===2026 ? 'selected' : ''}>2026年 5月</option>
                </select>
            </div>

            <table class="glass-report-table">
                <thead><tr><th>姓名</th><th>總積分</th></tr></thead>
                <tbody>
                    ${Object.keys(reportMap).length > 0 
                        ? Object.keys(reportMap).map(name => {
                            // 判斷是否為最高分
                            const isFirst = reportMap[name] === maxScore && maxScore > 0;
                            return `<tr>
                                <td>${isFirst ? '👑 ' : ''}${name}</td>
                                <td>${reportMap[name]}</td>
                            </tr>`;
                          }).join('')
                        : '<tr><td colspan="2">本月尚無賽事紀錄</td></tr>'}
                </tbody>
            </table>

            <button onclick="clearAllData()" style="font-size: 16px; background:#ff4d4d; color:white; border:none; padding: 10px 20px; border-radius: 5px; cursor:pointer;">
                🗑️ 清除所有歷史數據
            </button>
        </div>
    `;
}

function updateMonthSelector() {
    const selector = document.getElementById('month-selector');
    // 取得所有紀錄中的年月，並去重複
    let months = [...new Set(gameHistory.map(h => `${h.month}-${h.year}`))];
    
    // 排序：確保最新的在前面
    months.sort((a, b) => b.localeCompare(a));
    
    selector.innerHTML = months.map(m => {
        const [mo, yr] = m.split('-');
        return `<option value="${m}">${yr}年 ${mo}月</option>`;
    }).join('');
}

// 全域變數
let gameHistory = []; // 用來存每一局的紀錄

// 結算一局的函式
function endRound() {
    const now = new Date();
    let snapshot = {
        round: gameHistory.length + 1,
        players: JSON.parse(JSON.stringify(players)),
        year: now.getFullYear(),
        month: now.getMonth() + 1,
        timestamp: now.toLocaleString()
    };
    
    // 存入紀錄
    gameHistory.push(snapshot);
    localStorage.setItem('gameHistory', JSON.stringify(gameHistory)); 
    
    // 渲染更新
    renderHistory();
    renderMonthlyReport(); 
    alert("第 " + snapshot.round + " 局已結算並紀錄！");
}
//積分榜
function renderHistory() {
    let container = document.getElementById('history-list');
    
    // 1. 初始化容器，建立滾動區域
container.innerHTML = `<div class="history-scroll-container" id="history-scroll"></div>`;
    let scrollArea = document.getElementById('history-scroll');
    
    // 2. 確保 gameHistory 有資料
    if (gameHistory.length === 0) {
        scrollArea.innerHTML = "<p style='text-align:center; padding:20px;'>目前沒有賽事紀錄</p>";
        return;
    }
    // 3. 遍歷數據並正確追加到 scrollArea，不要再動 container
[...gameHistory].reverse().forEach(record => {
        scrollArea.innerHTML += `
            <div class="box" style="margin-top:10px; margin-bottom:10px;">
                <h3>第 ${record.round} 局 (${record.timestamp})</h3>
                <table class="glass-table">
                    <thead><tr><th>姓名</th><th>總積分</th></tr></thead>
                    <tbody>
                        ${record.players.map(p => `<tr><td>${p.name}</td><td>${p.score}</td></tr>`).join('')}
                    </tbody>
                </table>
            </div>
        `;
    });
}

        }


function enterGame() {
        // 1. 隱藏遮罩層
        document.getElementById('start-overlay').style.display = 'none';

        // 2. 強制預熱音效，強制讓瀏覽器解鎖權限
        globalRiseSound.play().then(() => {
            globalRiseSound.pause();
            globalRiseSound.currentTime = 0;
        }).catch(e => console.log("升盲音效預熱失敗"));

        globalWarningSound.play().then(() => {
            globalWarningSound.pause();
            globalWarningSound.currentTime = 0;
        }).catch(e => console.log("預警音效預熱失敗"));
        
        console.log("遊戲已啟動，音效權限已解鎖");
    }

function testAllSounds() {
    // 1. 播放升盲音效
    globalRiseSound.currentTime = 0;
    globalRiseSound.play().catch(e => console.log("升盲音效啟動失敗"));

    // 2. 【關鍵】立即播放並暫停預警音效，這會強制讓瀏覽器信任這個音訊來源
    globalWarningSound.currentTime = 0;
    globalWarningSound.play().then(() => {
        globalWarningSound.pause(); // 播放一瞬間後暫停
        globalWarningSound.currentTime = 0;
        console.log("預警音效已強制解鎖");
    }).catch(e => console.log("預警音效解鎖失敗"));
}
// 執行「下一局」邏輯

function startNewHand() {
    if (!confirm("確定要開始新的一局嗎？\n- 牌局數會 +1\n- 盲注回到第 1 級\n- 所有玩家的「獎勵、人頭、土地公」次數將歸 0")) {
        return;
    }

    // 1. 儲存目前的狀態供「復原」使用 (必須包含全域變數的備份)
    saveState(); 

    // 2. 牌局數 +1
    currentHand++;
    updateHandDisplay();

    // 3. 盲注回到第 1 級 (Index 0)
    currentLevelIndex = 0;
    timeLeft = blindStructure[0].time * 60;
    hasPlayedWarningThisLevel = false;
    updateBlindDisplay();
    updateTimerDisplay();
    pauseTimer();

    // 4. 所有玩家土地公歸 0
    players.forEach(p => {
        p.rebuy = 0;
    });

    // 4.1 所有玩家獎勵歸 0
    players.forEach(p => {
        p.bonus = 0;
    });

    // 4.2 所有玩家人頭歸 0
    players.forEach(p => {
        p.bounty = 0;
    });

    // 4.3 所有玩家積分歸 0
    players.forEach(p => {
    p.score = 0;
    });

    // 5. 強制刷新玩家列表顯示
    renderPlayers();
}
// 修改 saveState，將盲注級別和牌局數也存進去
function saveState() {
    let snapshot = {
        players: JSON.parse(JSON.stringify(players)),
        currentLevelIndex: currentLevelIndex,
        currentHand: currentHand
    };
    historyStack.push(snapshot);
    if (historyStack.length > 10) historyStack.shift();
    updateUndoButtonState();
}

// 修改 undo，把全域狀態恢復
function undo() {
    if (historyStack.length === 0) return;
    
    let state = historyStack.pop();
    players = state.players;
    currentLevelIndex = state.currentLevelIndex;
    currentHand = state.currentHand;
    
    // 恢復該級別的殘餘時間 (或直接重設為該級別開始)
    timeLeft = blindStructure[currentLevelIndex].time * 60;
    
    updateHandDisplay();
    updateBlindDisplay();
    updateTimerDisplay();
    renderPlayers();
    updateUndoButtonState();
}

function updateRebuy(index, value) {
    saveState(); // 確保修改前先存狀態
    players[index].rebuy = parseInt(value) || 0;
    renderPlayers();
}
        function updateUndoButtonState() {
            document.getElementById('undo-btn').disabled = historyStack.length === 0;
        }

        function setupPlayersMode(count) {
            pauseTimer();
            if (count === 7) { timeLeft = 15 * 60; alert("已設定為 7人模式，本級時間調至 15 分鐘！"); }
            else if (count === 5) { timeLeft = 10 * 60; alert("已設定為 5人模式，本級時間調至 10 分鐘！"); }
            else if (count === 3) { timeLeft = 8 * 60; alert("進入 3人決賽！時間調整為剩下 8 分鐘。"); }
            hasPlayedWarningThisLevel = false;
            updateTimerDisplay();
        }

        function updateHandDisplay() { document.getElementById('hand-display').innerText = currentHand; }
        function changeHand(amount) { currentHand = Math.max(1, currentHand + amount); updateHandDisplay(); }
        function resetHand() { currentHand = 1; updateHandDisplay(); }

        // 1. 優化音效播放邏輯（移除重複的 alert，只播放音效）

	function playAlertSound() {
    // 使用 .play() 前先重置時間，確保能連續播放
    globalRiseSound.currentTime = 0;
    globalRiseSound.play().catch(e => console.log("等待互動"));
    
    // 移除重複彈出的 alert，若需要提示，建議直接顯示在網頁 UI 上，不要用阻塞式的 alert
    console.log("升盲通知已觸發"); 
}

function playWarningSound() {
    globalWarningSound.currentTime = 0;
    globalWarningSound.play().catch(e => console.log("音效未解鎖"));
}

        function generateMultiplierBlinds() {
            let startSb = parseInt(document.getElementById('gen-sb').value) || 100;
            let startBb = parseInt(document.getElementById('gen-bb').value) || 200;
            let time = parseInt(document.getElementById('gen-time').value) || 10;
            let rounds = parseInt(document.getElementById('gen-rounds').value) || 10;
            let newStructure = [];
            let currentSb = startSb, currentBb = startBb, isAdjusted = false;
            for (let i = 1; i <= rounds; i++) {
                if (!isAdjusted && currentBb >= 6400) { currentSb = 3000; currentBb = 6000; isAdjusted = true; }
                newStructure.push({ level: i, sb: currentSb, bb: currentBb, time: time });
                currentSb *= 2; currentBb *= 2;
            }
            blindStructure = newStructure; currentLevelIndex = 0; timeLeft = blindStructure[0].time * 60;
            pauseTimer(); init();
        }

        function checkSpecialBlind() {
            let current = blindStructure[currentLevelIndex];
            document.getElementById('alert-tag').style.display = (current.sb === 3000 && current.bb === 6000) ? 'block' : 'none';
        }

        function updateTimerDisplay() {
            let mins = Math.floor(timeLeft / 60), secs = timeLeft % 60;
            document.getElementById('timer-display').innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function updateBlindDisplay() {
            let current = blindStructure[currentLevelIndex];
            document.getElementById('current-level').innerText = current.level;
            document.getElementById('blind-display').innerText = `SB: ${current.sb} / BB: ${current.bb}`;
            highlightCurrentLevel(); checkSpecialBlind();
        }

// 2. 修改計時器邏輯（精準 30 秒觸發）
function startTimer() {
    if (timerInterval) return;
    
    timerInterval = setInterval(() => {
        if (timeLeft > 0) {
            timeLeft--; 
            updateTimerDisplay();
            
            // 當剩餘時間剛好等於 30 秒時播放警告音效
            if (timeLeft === 30 && !hasPlayedWarningThisLevel) { 
                hasPlayedWarningThisLevel = true; 
                playWarningSound(); 
                // 如果想要在網頁上顯示提示，改用 DOM 操作
                // alert("⚠️ 牌局提醒：剩餘 30 秒！"); // 建議註解掉這行，以免干擾遊戲節奏
            }
        } else {
            // 時間歸零時，執行升盲
            playAlertSound(); 
            nextLevel(); 
        }
    }, 1000);
}
        function pauseTimer() { clearInterval(timerInterval); timerInterval = null; }
        function nextLevel() { if (currentLevelIndex < blindStructure.length - 1) { currentLevelIndex++; timeLeft = blindStructure[currentLevelIndex].time * 60; hasPlayedWarningThisLevel = false; updateBlindDisplay(); updateTimerDisplay(); playAlertSound(); } else pauseTimer(); }
        function prevLevel() { if (currentLevelIndex > 0) { currentLevelIndex--; timeLeft = blindStructure[currentLevelIndex].time * 60; hasPlayedWarningThisLevel = false; updateBlindDisplay(); updateTimerDisplay(); } }
        function resetTimer() { pauseTimer(); timeLeft = blindStructure[currentLevelIndex].time * 60; hasPlayedWarningThisLevel = false; updateTimerDisplay(); }

        function renderBlindTable() {
            let tbody = document.querySelector('#blind-table tbody'); tbody.innerHTML = "";
            blindStructure.forEach((b, index) => {
                let tr = document.createElement('tr'); tr.id = `blind-row-${index}`;
                if (b.sb === 3000 && b.bb === 6000) tr.className = 'target-blind-row';
                tr.innerHTML = `<td>${b.level}</td><td>${b.sb} / ${b.bb}</td><td>${b.time} 分</td>`;
                tbody.appendChild(tr);
            });
            highlightCurrentLevel();
        }

        function highlightCurrentLevel() {
            blindStructure.forEach((b, index) => {
                let row = document.getElementById(`blind-row-${index}`);
                if (row) {
                    if (index === currentLevelIndex) { row.style.background = "#444"; row.style.color = (b.sb === 3000 && b.bb === 6000) ? "#ff9f43" : "#00ffcc"; row.style.fontWeight = "bold"; }
                    else { if (!(b.sb === 3000 && b.bb === 6000)) { row.style.background = "none"; row.style.color = "#fff"; row.style.fontWeight = "normal"; } }
                }
            });
        }

        function addPlayer() {
            let nameInput = document.getElementById('player-name');
            if (nameInput.value.trim() === "") return;
            saveState(); players.push({ name: nameInput.value.trim(), score: 0, bonus: 0, bounty: 0, rebuy: 0 });
            nameInput.value = ""; renderPlayers();
        }

        function updateScore(index, amount) { saveState(); players[index].score += parseInt(amount) || 0; renderPlayers(); }
        function updateBonus(index, val) { saveState(); players[index].bonus = parseInt(val) || 0; }
        function updateBounty(index, val) { saveState(); players[index].bounty = parseInt(val) || 0; }
        function triggerBonusAdd(index) { saveState(); players[index].bonus++; players[index].score += 100; players.forEach((p, i) => { if (i !== index) p.score -= 100; }); renderPlayers(); }
        function triggerBountyAdd(index) { saveState(); players[index].bounty++; players[index].score += 50; renderPlayers(); }

function renderPlayers() {
    let list = document.getElementById('player-list');
    list.innerHTML = "";
    players.forEach((player, index) => {
        let li = document.createElement('li');
        li.innerHTML = `
            <div class="player-info">
                <span><strong>${player.name}</strong></span>
                <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
                    <div style="display: flex; align-items: center; gap: 3px;">
                        <span style="color: #aaa; font-size: 11px;">獵頭:</span>
                        <input type="number" class="input-bonus" value="${player.bounty || 0}" onchange="updateBounty(${index}, this.value)" style="border-color:#ff4d4d; color:#ff4d4d; width: 40px;">
                        <button onclick="triggerBountyAdd(${index})" style="background: #ff4d4d; color: #fff; border: none; padding: 3px 6px; font-size: 11px; border-radius: 4px; cursor: pointer; font-weight: bold;">🎯 +1</button>
                    </div>
                    <div style="display: flex; align-items: center; gap: 3px;">
                        <span style="color: #aaa; font-size: 11px;">獎勵:</span>
                        <input type="number" class="input-bonus" value="${player.bonus || 0}" onchange="updateBonus(${index}, this.value)" style="width: 40px;">
                        <button onclick="triggerBonusAdd(${index})" style="background: #ffcc00; color: #000; border: none; padding: 3px 6px; font-size: 11px; border-radius: 4px; cursor: pointer; font-weight: bold;">🏆 +1</button>
                    </div>
                    <div style="display: flex; align-items: center; gap: 3px;">
                        <span style="color: #aaa; font-size: 11px;">土地公:</span>
                        <input type="number" class="input-bonus" value="${player.rebuy || 0}" onchange="updateRebuy(${index}, this.value)" style="border-color:#ff4d4d; color:#ff4d4d; width: 40px;">
                        <button onclick="triggerRebuyAdd(${index})" style="background: #ffcc00; color: #000; border: none; padding: 3px 6px; font-size: 11px; border-radius: 4px; cursor: pointer; font-weight: bold;">🏧 +1</button>
                    </div>
                </div>
            </div>
            <div class="player-controls">
                <span>總積分: <b style="color:#00ffcc; font-size:16px;">${player.score}</b></span>
                <div>
                    <button class="btn-plus" onclick="updateScore(${index}, 200)">+200</button>
                    <button class="btn-minus" onclick="updateScore(${index}, -200)">-200</button>
                    <button class="btn-plus" onclick="updateScore(${index}, 50)">+50</button>
                    <button class="btn-minus" onclick="updateScore(${index}, -50)">-50</button>
                </div>
            </div>`;
        list.appendChild(li);
    });
}


// 處理輸入框手動輸入
function updateRebuy(index, value) {
    players[index].rebuy = parseInt(value) || 0;
    renderPlayers();
}

// 處理按鈕點擊 +1
function triggerRebuyAdd(index) {
    players[index].rebuy = (players[index].rebuy || 0) + 1;
    renderPlayers();
}
        document.addEventListener("DOMContentLoaded", init);
    </script>
</body>
